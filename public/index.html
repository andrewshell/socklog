<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>socklog</title>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        background: #fff;
        color: #333;
        min-height: 100vh;
        padding: 24px;
      }

      .header {
        display: flex;
        align-items: baseline;
        gap: 12px;
        flex-wrap: wrap;
        margin-bottom: 16px;
      }

      h1 {
        font-weight: 500;
      }

      .header a {
        font-size: 14px;
        color: #4a90e2;
        text-decoration: none;
      }

      .header a:hover {
        text-decoration: underline;
      }

      .demo-container {
        max-width: 1200px;
        margin: 0 auto;
      }

      .log-panel {
        border: 1px solid #e0e0e0;
        border-radius: 8px;
        overflow: hidden;
      }

      .connect-form {
        display: flex;
        gap: 8px;
        margin-bottom: 16px;
      }

      .connect-form input {
        flex: 1;
        padding: 10px 12px;
        font-size: 14px;
        border: 1px solid #ccc;
        border-radius: 6px;
        font-family: inherit;
      }

      .connect-form input:focus {
        outline: none;
        border-color: #4a90e2;
      }

      .connect-form button {
        padding: 10px 18px;
        font-size: 14px;
        font-weight: 500;
        color: #fff;
        background: #4a90e2;
        border: none;
        border-radius: 6px;
        cursor: pointer;
      }

      .connect-form button:hover {
        background: #357abd;
      }

      .status {
        min-height: 20px;
        margin-bottom: 16px;
        font-size: 13px;
        color: #c0392b;
      }
    </style>
  </head>
  <body>
    <script type="module">
      import 'https://esm.sh/@andrewshell/socklog'

      const input = document.getElementById('ws-url')
      const button = document.getElementById('connect-btn')
      const status = document.getElementById('status')
      const panel = document.getElementById('panel')

      if (location.hash.length > 1) {
        input.value = decodeURIComponent(location.hash.slice(1))
      }

      async function connect() {
        const url = input.value.trim()
        status.textContent = ''

        if (!url) {
          status.textContent = 'Please enter a WebSocket URL.'
          return
        }
        if (!/^wss?:\/\//i.test(url)) {
          status.textContent = 'URL must start with ws:// or wss://'
          return
        }

        panel.replaceChildren()

        const sender = document.createElement('socklog-sender')
        sender.id = 'sender'

        const controls = document.createElement('socklog-controls')
        controls.id = 'controls'

        const viewer = document.createElement('socklog-viewer')
        viewer.id = 'viewer'
        viewer.url = url

        panel.append(sender, controls, viewer)
        panel.hidden = false

        await Promise.all([
          customElements.whenDefined('socklog-viewer'),
          customElements.whenDefined('socklog-controls'),
          customElements.whenDefined('socklog-sender'),
        ])

        controls.store = viewer.getStore()
        sender.client = viewer.getClient()

        location.hash = encodeURIComponent(url)
      }

      button.addEventListener('click', connect)
      input.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') connect()
      })
    </script>

    <div class="demo-container">
      <div class="header">
        <h1>socklog</h1>
        <a href="https://github.com/andrewshell/socklog" target="_blank" rel="noopener noreferrer"
          >Learn more about this project…</a
        >
      </div>

      <div class="connect-form">
        <input type="text" id="ws-url" placeholder="ws://localhost:8080" autocomplete="off" />
        <button id="connect-btn">Connect</button>
      </div>

      <div id="status" class="status" role="status" aria-live="polite"></div>

      <div id="panel" class="log-panel" hidden></div>
    </div>
  </body>
</html>
